<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --bg2: #141417;
    --bg3: #1c1c21;
    --bg4: #222228;
    --line: rgba(255,255,255,0.07);
    --line2: rgba(255,255,255,0.12);
    --text: #f0eeea;
    --muted: #6b6a72;
    --muted2: #9998a3;
    --accent: #7c6aff;
    --accent2: #a594ff;
    --accent-bg: rgba(124,106,255,0.1);
    --accent-border: rgba(124,106,255,0.3);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.1);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.1);
    --red: #ef4444;
    --teal: #2dd4bf;
    --r: 8px;
    --rl: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── grid noise bg ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── header ── */
  header {
    margin-bottom: 40px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    justify-content: space-between;
  }

  .logo-row-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: var(--r);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .github-icon {
    width: 32px;
    height: 32px;
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: var(--r);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: var(--muted2);
  }

  .github-icon:hover {
    border-color: var(--accent-border);
    color: var(--accent2);
    background: var(--accent-bg);
  }

  .github-icon svg {
    width: 16px;
    height: 16px;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── stats bar ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted2);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s;
  }

  .stat .num {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    font-family: 'Syne', sans-serif;
  }

  .stat.accent { border-color: var(--accent-border); }
  .stat.accent .num { color: var(--accent2); }

  /* ── input area ── */
  .input-card {
    background: var(--bg2);
    border: 1px solid var(--line2);
    border-radius: var(--rl);
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .input-card:focus-within {
    border-color: var(--accent-border);
  }

  .input-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent-border); }
  textarea::placeholder { color: var(--muted); }

  /* ── action bar ── */
  .action-bar {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--r);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--line2);
    background: var(--bg3);
    color: var(--text);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--bg4); border-color: var(--line2); }
  .btn:active { transform: scale(0.97); }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

  .btn.danger { color: var(--red); border-color: rgba(239,68,68,0.2); }
  .btn.danger:hover { background: rgba(239,68,68,0.08); }

  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  .spacer { flex: 1; }

  /* ── search & filter ── */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    color: var(--muted);
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    padding: 7px 12px 7px 32px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus { border-color: var(--accent-border); }
  input[type="search"]::placeholder { color: var(--muted); }

  .sort-btn {
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: var(--r);
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .sort-btn:hover, .sort-btn.active { border-color: var(--accent-border); color: var(--accent2); }

  /* ── cookie list ── */
  .cookie-list { display: flex; flex-direction: column; gap: 6px; }

  .cookie-row {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--rl);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    align-items: center;
    transition: border-color 0.15s, background 0.15s;
    animation: rowIn 0.2s ease both;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cookie-row:hover { border-color: var(--line2); background: var(--bg3); }

  .cookie-row.secure { border-left: 2px solid var(--green); }
  .cookie-row.http   { border-left: 2px solid var(--accent); }
  .cookie-row.session { border-left: 2px solid var(--amber); }

  .field {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .field-value {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .field-value.name-val { color: var(--accent2); font-weight: 500; }

  .copy-group {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .copy-btn {
    background: var(--bg4);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }

  .copy-btn:hover { border-color: var(--accent-border); color: var(--accent2); background: var(--accent-bg); }
  .copy-btn.copied { border-color: rgba(62,207,142,0.3); color: var(--green); background: var(--green-bg); }
  .copy-btn svg { width: 11px; height: 11px; }

  .del-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
  }
  .del-btn:hover { color: var(--red); background: rgba(239,68,68,0.08); }
  .del-btn svg { width: 13px; height: 13px; }

  /* ── badges ── */
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.05em;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge.secure { background: var(--green-bg); color: var(--green); }
  .badge.http   { background: var(--accent-bg); color: var(--accent2); }
  .badge.session{ background: var(--amber-bg); color: var(--amber); }

  /* ── export panel ── */
  .export-panel {
    margin-top: 24px;
    background: var(--bg2);
    border: 1px solid var(--line2);
    border-radius: var(--rl);
    overflow: hidden;
  }

  .export-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .export-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .export-title svg { width: 15px; height: 15px; color: var(--accent2); }

  .format-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .fmt-tab {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--bg3);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .fmt-tab:hover, .fmt-tab.active {
    border-color: var(--accent-border);
    color: var(--accent2);
    background: var(--accent-bg);
  }

  .export-body {
    padding: 16px 20px;
  }

  .export-desc {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  pre.export-preview {
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    color: var(--muted2);
    overflow-x: auto;
    max-height: 220px;
    overflow-y: auto;
    white-space: pre;
    line-height: 1.6;
  }

  pre.export-preview::-webkit-scrollbar { width: 4px; height: 4px; }
  pre.export-preview::-webkit-scrollbar-track { background: transparent; }
  pre.export-preview::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .export-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  /* ── empty state ── */
  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .empty svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.3; }

  /* ── toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--green-bg);
    border-left: 3px solid var(--green);
    border-radius: var(--r);
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--green);
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── section label ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* scrollbar global */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  .ns-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }

  .ns-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--line2);
    background: var(--bg2);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .ns-toggle:hover { border-color: var(--accent-border); color: var(--accent2); }
  .ns-toggle.active {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent2);
  }

  .ns-btn-sm {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: var(--r);
    border: 1px solid var(--line);
    background: var(--bg2);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ns-btn-sm:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }

  @media (max-width: 600px) {
    .cookie-row { grid-template-columns: 1fr auto; }
    .cookie-row .field:nth-child(2) { display: none; }
    h1 { font-size: 22px; }
  }
</style>
</head>

<div class="wrap">

  <header>
    <div class="logo-row">
      <div class="logo-row-left">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#a594ff;width:20px;height:20px"><path d="M12 2C8.5 2 5 4 5 8c0 2 1 3.5 2 4.5L5 20h14l-2-7.5C18 11.5 19 10 19 8c0-4-3.5-6-7-6z"/></svg>
        </div>
        <div>
          <h1>Cookie Jar</h1>
          <div class="tagline">// parse · inspect · export</div>
        </div>
      </div>
      <a href="https://github.com/nahom-network/cookie-jar" class="github-icon" title="View on GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      </a>
    </div>
  </header>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat accent">
      <span class="num" id="statTotal">0</span> cookies
    </div>
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;color:#3ecf8e"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span class="num" id="statSecure">0</span> __Secure
    </div>
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;color:#7c6aff"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span class="num" id="statHttp">0</span> __Http
    </div>
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;color:#f59e0b"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="num" id="statAvgLen">0</span> avg value len
    </div>
  </div>

  <div class="input-card">
    <div class="input-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Paste cookie string
    </div>
    <textarea id="cookieInput" placeholder="__Secure-3PSID=abc123; NID=532=xyz; session=token; __Secure-3PAPISID=foo/bar"></textarea>
    <div class="action-bar">
      <button class="btn primary" onclick="parseCookies()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 2 13 9 20 9"/><path d="M20 9L9 20 4 15 13 6"/></svg>
        Parse
      </button>
      <button class="btn" onclick="loadSample()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Sample
      </button>
      <div class="spacer"></div>
      <button class="btn danger" onclick="clearAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear
      </button>
    </div>
  </div>

  <div id="resultsSection" style="display:none">

    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Filter cookies..." oninput="renderList()">
      </div>
      <button class="sort-btn" id="sortBtn" onclick="toggleSort()">A→Z</button>
      <button class="btn" onclick="copyAllJSON()" style="font-size:12px; padding:7px 12px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy all JSON
      </button>
    </div>

    <div class="section-label">Cookies <span id="countLabel" style="color:var(--accent2)"></span></div>
    <div class="cookie-list" id="cookieList"></div>

    <div class="export-panel" style="margin-top:28px">
      <div class="export-header">
        <div class="export-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" y2="3"/></svg>
          Export
        </div>
        <div class="format-tabs" id="formatTabs"></div>
      </div>
      <div class="export-body">
        <div id="netscapeControls" style="display:none; background:var(--bg3); border:1px solid var(--line); border-radius:var(--r); padding:14px 16px; margin-bottom:14px;">
          <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end;">
            <div style="flex:1; min-width:180px;">
              <div class="ns-label">Domain</div>
              <div style="position:relative;">
                <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);pointer-events:none;">.</span>
                <input id="nsDomain" type="text" value="example.com" oninput="updateExport()" style="width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);color:var(--text);font-family:'DM Mono',monospace;font-size:12.5px;padding:8px 12px 8px 24px;outline:none;transition:border-color 0.2s;">
              </div>
            </div>
            <div style="flex:1; min-width:140px;">
              <div class="ns-label">Path</div>
              <input id="nsPath" type="text" value="/" oninput="updateExport()" style="width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);color:var(--text);font-family:'DM Mono',monospace;font-size:12.5px;padding:8px 12px;outline:none;transition:border-color 0.2s;">
            </div>
            <div style="flex:1; min-width:160px;">
              <div class="ns-label">Expiry (unix timestamp)</div>
              <input id="nsExpiry" type="text" value="0" oninput="updateExport()" placeholder="0 = session" style="width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);color:var(--text);font-family:'DM Mono',monospace;font-size:12.5px;padding:8px 12px;outline:none;transition:border-color 0.2s;">
            </div>
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; align-items:center;">
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-right:4px;">Flags:</span>
            <button class="ns-toggle active" id="nsIncludeSubdomains" onclick="nsToggle(this)" data-label="include subdomains">include subdomains</button>
            <button class="ns-toggle" id="nsSecureOverride" onclick="nsToggle(this)" data-label="force secure=TRUE">force secure</button>
            <button class="ns-toggle" id="nsAutoSecure" onclick="nsToggle(this)" data-label="auto secure">auto-secure</button>
            <button class="ns-toggle" id="nsHttpOnly" onclick="nsToggle(this)" data-label="HttpOnly">HttpOnly</button>
            <button class="ns-toggle" id="nsSameSite" onclick="nsToggle(this)" data-label="SameSite=Lax">SameSite=Lax</button>
            <div style="flex:1"></div>
            <button class="ns-toggle" id="nsSetExpiry" onclick="nsToggle(this);document.getElementById('nsExpiry').disabled=!document.getElementById('nsSetExpiry').classList.contains('active');updateExport();">set expiry</button>
            <button class="ns-btn-sm" onclick="setExpiryDays(1)">+1d</button>
            <button class="ns-btn-sm" onclick="setExpiryDays(7)">+7d</button>
            <button class="ns-btn-sm" onclick="setExpiryDays(30)">+30d</button>
            <button class="ns-btn-sm" onclick="setExpiryDays(365)">+1y</button>
          </div>
          <div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--line); display:flex; gap:16px; flex-wrap:wrap;">
            <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);">Preview row format:</div>
            <div id="nsFormatPreview" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);word-break:break-all;"></div>
          </div>
        </div>
        <div class="export-desc" id="exportDesc"></div>
        <pre class="export-preview" id="exportPreview"></pre>
        <div class="export-actions">
          <button class="btn primary" onclick="copyExport()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy
          </button>
          <button class="btn" onclick="downloadExport()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" y2="3"/></svg>
            Download
          </button>
        </div>
      </div>
    </div>

  </div>

  <div id="emptyState" style="display:none" class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.5 2 5 4 5 8c0 2 1 3.5 2 4.5L5 20h14l-2-7.5C18 11.5 19 10 19 8c0-4-3.5-6-7-6z"/></svg>
    <div>No cookies match your filter</div>
  </div>

</div>

<div id="toast"></div>

<script>
let cookies = [];
let sortAsc = false;
let activeFormat = 'json-array';

const FORMATS = {
  'json-array': {
    label: 'JSON Array',
    ext: 'json',
    desc: '// Standard { cookies: [...] } format with name/value pairs',
    build: () => JSON.stringify({ cookies: cookies.map(c => ({ name: c.name, value: c.value })) }, null, 2)
  },
  'json-flat': {
    label: 'JSON Flat',
    ext: 'json',
    desc: '// Flat object { name: value, ... } — great for quick lookups',
    build: () => {
      const obj = {};
      cookies.forEach(c => obj[c.name] = c.value);
      return JSON.stringify(obj, null, 2);
    }
  },
  'netscape': {
    label: 'Netscape',
    ext: 'txt',
    desc: '// Netscape/Mozilla cookie file format — works with curl --cookie-jar, wget',
    build: () => buildNetscape()
  },
  'header': {
    label: 'HTTP Header',
    ext: 'txt',
    desc: '// Ready to paste as a Cookie: request header',
    build: () => 'Cookie: ' + cookies.map(c => `${c.name}=${c.value}`).join('; ')
  },
  'curl': {
    label: 'cURL',
    ext: 'sh',
    desc: '// Drop into a curl command with -b flag',
    build: () => `-b '${cookies.map(c => `${c.name}=${c.value}`).join('; ')}'`
  },
  'python': {
    label: 'Python',
    ext: 'py',
    desc: '// Python dict for requests.Session().cookies.update(...)',
    build: () => {
      const lines = ['cookies = {'];
      cookies.forEach(c => lines.push(`    ${JSON.stringify(c.name)}: ${JSON.stringify(c.value)},`));
      lines.push('}');
      return lines.join('\n');
    }
  },
  'js': {
    label: 'JavaScript',
    ext: 'js',
    desc: '// document.cookie setter calls for each cookie',
    build: () => cookies.map(c => `document.cookie = "${c.name}=${c.value}; path=/";`).join('\n')
  },
  'csv': {
    label: 'CSV',
    ext: 'csv',
    desc: '// Comma-separated — open in Excel, Sheets, or any spreadsheet',
    build: () => {
      const esc = v => '"' + String(v).replace(/"/g, '""') + '"';
      return ['name,value', ...cookies.map(c => `${esc(c.name)},${esc(c.value)}`)].join('\n');
    }
  }
};

function parseCookies() {
  const raw = document.getElementById('cookieInput').value.trim();
  if (!raw) return;
  cookies = [];
  raw.split(';').forEach(part => {
    part = part.trim();
    if (!part) return;
    const idx = part.indexOf('=');
    if (idx !== -1) {
      cookies.push({ name: part.slice(0, idx).trim(), value: part.slice(idx + 1).trim() });
    } else {
      cookies.push({ name: part, value: '' });
    }
  });
  updateStats();
  renderList();
  renderFormatTabs();
  updateExport();
  document.getElementById('resultsSection').style.display = cookies.length ? 'block' : 'none';
  document.getElementById('statsBar').style.display = cookies.length ? 'flex' : 'none';
  if (cookies.length) toast(`Parsed ${cookies.length} cookie${cookies.length !== 1 ? 's' : ''}`);
}

function updateStats() {
  document.getElementById('statTotal').textContent = cookies.length;
  document.getElementById('statSecure').textContent = cookies.filter(c => c.name.startsWith('__Secure')).length;
  document.getElementById('statHttp').textContent = cookies.filter(c => c.name.startsWith('__Http') || c.name.startsWith('__Host')).length;
  const avg = cookies.length ? Math.round(cookies.reduce((s, c) => s + c.value.length, 0) / cookies.length) : 0;
  document.getElementById('statAvgLen').textContent = avg;
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = cookies.filter(c => !q || c.name.toLowerCase().includes(q) || c.value.toLowerCase().includes(q));
  if (sortAsc) list = [...list].sort((a, b) => a.name.localeCompare(b.name));

  document.getElementById('countLabel').textContent = list.length !== cookies.length ? `${list.length} / ${cookies.length}` : cookies.length;
  document.getElementById('emptyState').style.display = list.length === 0 && q ? 'block' : 'none';

  const container = document.getElementById('cookieList');
  container.innerHTML = '';

  list.forEach((c, i) => {
    const isSecure = c.name.startsWith('__Secure');
    const isHttp = c.name.startsWith('__Http') || c.name.startsWith('__Host');
    const isSession = c.name.toLowerCase().includes('session') || c.name.toLowerCase().includes('sid');
    const cls = isSecure ? 'secure' : isHttp ? 'http' : isSession ? 'session' : '';

    const row = document.createElement('div');
    row.className = `cookie-row ${cls}`;
    row.style.animationDelay = `${Math.min(i * 20, 200)}ms`;

    const badge = isSecure ? '<span class="badge secure">SECURE</span>' :
                  isHttp   ? '<span class="badge http">HOST</span>' :
                  isSession? '<span class="badge session">SESSION</span>' : '';

    const shortVal = c.value.length > 50 ? c.value.slice(0, 50) + '…' : c.value;

    row.innerHTML = `
      <div class="field">
        <span class="field-label">name</span>
        <span class="field-value name-val" title="${esc(c.name)}">${esc(c.name)}${badge}</span>
      </div>
      <div class="field">
        <span class="field-label">value · ${c.value.length} chars</span>
        <span class="field-value" title="${esc(c.value)}">${esc(shortVal)}</span>
      </div>
      <div class="copy-group">
        <button class="copy-btn" onclick="copyField(this, '${escAttr(c.name)}')" title="Copy name">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>name
        </button>
        <button class="copy-btn" onclick="copyField(this, '${escAttr(c.value)}')" title="Copy value">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>value
        </button>
        <button class="copy-btn" onclick="copyField(this, '${escAttr(c.name + '=' + c.value)}')" title="Copy name=value">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>pair
        </button>
        <button class="del-btn" onclick="deleteCookie(${cookies.indexOf(c)})" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>`;
    container.appendChild(row);
  });
}

function renderFormatTabs() {
  const tabs = document.getElementById('formatTabs');
  tabs.innerHTML = '';
  Object.entries(FORMATS).forEach(([key, fmt]) => {
    const btn = document.createElement('button');
    btn.className = 'fmt-tab' + (key === activeFormat ? ' active' : '');
    btn.textContent = fmt.label;
    btn.onclick = () => { activeFormat = key; renderFormatTabs(); updateExport(); };
    tabs.appendChild(btn);
  });
}

function buildNetscape() {
  const domain = (document.getElementById('nsDomain').value.trim() || 'example.com');
  const fullDomain = '.' + domain.replace(/^\.+/, '');
  const path = document.getElementById('nsPath').value.trim() || '/';
  const includeSubdomains = document.getElementById('nsIncludeSubdomains').classList.contains('active');
  const forceSecure = document.getElementById('nsSecureOverride').classList.contains('active');
  const autoSecure = document.getElementById('nsAutoSecure').classList.contains('active');
  const httpOnly = document.getElementById('nsHttpOnly').classList.contains('active');
  const sameSite = document.getElementById('nsSameSite').classList.contains('active');
  const useExpiry = document.getElementById('nsSetExpiry').classList.contains('active');
  const expiry = useExpiry ? (document.getElementById('nsExpiry').value.trim() || '0') : '0';

  const subdomain = includeSubdomains ? 'TRUE' : 'FALSE';

  const lines = ['# Netscape HTTP Cookie File', '# https://curl.se/docs/http-cookies.html', '#', '# Generated by Cookie Jar', ''];

  if (httpOnly) lines[0] += '\n# HttpOnly cookies included';
  if (sameSite) lines[0] += '\n# SameSite=Lax applied';

  cookies.forEach(c => {
    const isSecureCookie = forceSecure || (autoSecure && (c.name.startsWith('__Secure') || c.name.startsWith('__Host')));
    const secure = isSecureCookie ? 'TRUE' : 'FALSE';
    const prefix = httpOnly ? '#HttpOnly_' : '';
    const parts = [prefix + fullDomain, subdomain, path, secure, expiry, c.name, c.value];
    lines.push(parts.join('\t'));
  });

  const sample = cookies[0];
  const sampleSecure = forceSecure || (autoSecure && sample && (sample.name.startsWith('__Secure') || sample.name.startsWith('__Host'))) ? 'TRUE' : 'FALSE';
  const previewEl = document.getElementById('nsFormatPreview');
  if (previewEl) {
    previewEl.textContent = [
      (httpOnly ? '#HttpOnly_' : '') + fullDomain,
      subdomain, path, sampleSecure, expiry,
      '<name>', '<value>'
    ].join('  \u2502  ');
  }

  return lines.join('\n');
}

function nsToggle(btn) {
  btn.classList.toggle('active');
  updateExport();
}

function setExpiryDays(days) {
  const ts = Math.floor(Date.now() / 1000) + days * 86400;
  document.getElementById('nsExpiry').value = ts;
  document.getElementById('nsSetExpiry').classList.add('active');
  document.getElementById('nsExpiry').disabled = false;
  updateExport();
}

function updateExport() {
  const fmt = FORMATS[activeFormat];
  const nsPanel = document.getElementById('netscapeControls');
  if (nsPanel) nsPanel.style.display = activeFormat === 'netscape' ? 'block' : 'none';
  document.getElementById('exportDesc').textContent = fmt.desc;
  try {
    document.getElementById('exportPreview').textContent = fmt.build();
  } catch(e) {
    document.getElementById('exportPreview').textContent = '// Error generating preview';
  }
}

function copyField(btn, value) {
  navigator.clipboard.writeText(value).then(() => {
    btn.classList.add('copied');
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>copied`;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1500);
  });
}

function copyAllJSON() {
  const obj = { cookies: cookies.map(c => ({ name: c.name, value: c.value })) };
  navigator.clipboard.writeText(JSON.stringify(obj, null, 2)).then(() => toast('JSON copied'));
}

function copyExport() {
  const text = document.getElementById('exportPreview').textContent;
  navigator.clipboard.writeText(text).then(() => toast(`${FORMATS[activeFormat].label} copied`));
}

function downloadExport() {
  const fmt = FORMATS[activeFormat];
  const text = document.getElementById('exportPreview').textContent;
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cookies.${fmt.ext}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`Downloaded as cookies.${fmt.ext}`);
}

function loadSample() {
  document.getElementById('cookieInput').value = '__Secure-3PSID=abc123def456; NID=532=xyz789; session_id=token_abc; __Host-HSID=xyz789; preferences=theme=dark|lang=en';
  parseCookies();
}

function clearAll() {
  if (confirm('Clear all cookies?')) {
    cookies = [];
    document.getElementById('cookieInput').value = '';
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('statsBar').style.display = 'none';
    toast('Cleared');
  }
}

function deleteCookie(idx) {
  cookies.splice(idx, 1);
  updateStats();
  renderList();
  updateExport();
  if (cookies.length === 0) {
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('statsBar').style.display = 'none';
  }
}

function toggleSort() {
  sortAsc = !sortAsc;
  document.getElementById('sortBtn').textContent = sortAsc ? 'Z→A' : 'A→Z';
  renderList();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function escAttr(s) {
  return esc(s).replace(/'/g, "\\'");
}

// Initialize on load
document.addEventListener('DOMContentLoaded', () => {
  // Page is ready
});
</script>
</body>
</html>
